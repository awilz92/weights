<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F1EFE8">
<title>Lift Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --cream:#F1EFE8;
    --cream-dark:#E8E5DC;
    --ink:#1a1a18;
    --ink2:#6b6a62;
    --ink3:#9c9a92;
    --green-bg:#E1F5EE;
    --green:#1D9E75;
    --green-dark:#085041;
    --green-light:#9FE1CB;
    --purple-bg:#EEEDFE;
    --purple:#534AB7;
    --red-bg:#FCEBEB;
    --red:#A32D2D;
    --border:rgba(26,26,24,0.12);
    --white:#ffffff;
  }
  html,body{height:100%;background:var(--cream)}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);max-width:480px;margin:0 auto;padding:0}
  .app{min-height:100vh;padding:0 0 80px}

  /* Nav */
  .nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--white);border-top:0.5px solid var(--border);display:flex;z-index:100;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:10px;font-family:inherit;font-weight:500;transition:color 0.15s}
  .nav-btn.active{color:var(--green)}
  .nav-btn svg{width:22px;height:22px}

  /* Pages */
  .page{display:none;padding:0 16px}
  .page.active{display:block}
  .page-header{padding:20px 16px 12px;background:var(--cream);position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
  .page-title{font-size:22px;font-weight:600;color:var(--ink)}

  /* Cards */
  .card{background:var(--white);border-radius:16px;border:0.5px solid var(--border);padding:1.25rem;margin-bottom:10px}
  .card-cream{background:var(--cream-dark);border-radius:16px;padding:1.25rem;margin-bottom:10px}
  .card-tap{cursor:pointer;transition:transform 0.1s,opacity 0.1s}
  .card-tap:active{transform:scale(0.985);opacity:0.85}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:12px;border:1px solid var(--border);background:var(--white);color:var(--ink);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.12s;-webkit-tap-highlight-color:transparent}
  .btn:active{transform:scale(0.97)}
  .btn-primary{background:var(--ink);color:var(--white);border-color:transparent}
  .btn-primary:active{opacity:0.85}
  .btn-danger{color:var(--red);border-color:rgba(163,45,45,0.25);background:var(--red-bg)}
  .btn-sm{padding:7px 14px;font-size:13px;border-radius:10px}
  .btn-full{width:100%;margin-top:12px;padding:16px;font-size:16px;border-radius:14px}
  .btn-ghost{border:none;background:transparent;padding:6px}

  /* Badges */
  .badge{display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:3px 10px;border-radius:99px}
  .badge-up{background:var(--green-bg);color:var(--green-dark)}
  .badge-pr{background:var(--purple-bg);color:var(--purple)}
  .badge-fail{background:var(--red-bg);color:var(--red)}

  /* Lift list */
  .lift-name{font-size:16px;font-weight:500;color:var(--ink)}
  .lift-meta{font-size:13px;color:var(--ink3);margin-top:3px}
  .lift-row{display:flex;align-items:center;justify-content:space-between;gap:8px}

  /* Set logging */
  .big-title{font-size:28px;font-weight:600;color:var(--ink);margin-bottom:2px}
  .set-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .set-card{border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;background:var(--white)}
  .set-card.done{border-color:var(--green);background:var(--green-bg)}
  .set-card.failed{border-color:var(--red);background:var(--red-bg)}
  .set-label{font-size:11px;color:var(--ink3);margin-bottom:5px}
  .set-reps{font-size:20px;font-weight:600;color:var(--ink)}
  .set-card.done .set-reps{color:var(--green-dark)}
  .set-card.failed .set-reps{color:var(--red)}
  .set-sublabel{font-size:11px;margin-top:3px;color:var(--ink3)}
  .set-card.done .set-sublabel{color:var(--green)}
  .set-card.failed .set-sublabel{color:var(--red)}
  .dots{display:flex;gap:8px;align-items:center;margin-top:10px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--cream-dark)}
  .dot.done{background:var(--green)}
  .dot.failed{background:var(--red)}

  /* Weight control */
  .weight-ctrl{display:flex;align-items:center;gap:16px;justify-content:center;padding:16px 0}
  .w-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--white);color:var(--ink);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all 0.1s}
  .w-btn:active{background:var(--cream);transform:scale(0.93)}
  .w-val{font-size:30px;font-weight:600;color:var(--ink);min-width:110px;text-align:center}

  /* Reps row */
  .reps-row{display:flex;align-items:center;gap:12px;justify-content:center;padding:10px 0 4px;border-top:0.5px solid var(--border);margin-top:4px}

  /* Stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .stat{background:var(--cream);border-radius:12px;padding:14px}
  .stat-label{font-size:12px;color:var(--ink3);margin-bottom:3px}
  .stat-val{font-size:24px;font-weight:600;color:var(--ink)}
  .stat-val.green{color:var(--green-dark)}

  /* Rule box */
  .rule-box{border-left:3px solid var(--green);padding:10px 14px;background:var(--green-bg);border-radius:0 10px 10px 0;margin-top:10px;font-size:13px;color:var(--green-dark);line-height:1.5}

  /* Bar chart */
  .bar-chart{display:flex;align-items:flex-end;gap:5px;height:64px;background:var(--cream);border-radius:10px;padding:10px 10px 0}
  .bar{flex:1;border-radius:4px 4px 0 0}

  /* Forms */
  .form-row{margin-bottom:14px}
  .form-label{font-size:13px;color:var(--ink2);font-weight:500;display:block;margin-bottom:5px}
  input[type=text],input[type=number],select{font-family:inherit;font-size:16px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--white);color:var(--ink);width:100%}
  input:focus,select:focus{outline:none;border-color:var(--green)}
  .inline-form{background:var(--cream-dark);border-radius:16px;padding:1.25rem;margin-bottom:12px}

  /* History */
  .history-sets{display:flex;gap:6px;margin-top:8px}
  .hset{flex:1;border-radius:8px;padding:8px 4px;text-align:center}
  .hset-done{background:var(--green-bg)}
  .hset-fail{background:var(--red-bg)}

  /* Toast */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:10px 22px;border-radius:99px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999}
  .toast.show{opacity:1}

  /* Empty state */
  .empty{text-align:center;color:var(--ink3);font-size:15px;padding:3rem 1rem;line-height:1.6}
  .empty-icon{font-size:36px;margin-bottom:12px}

  /* Section divider */
  .section-label{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px}

  /* Back header */
  .back-header{display:flex;align-items:center;gap:8px;padding:16px 16px 8px}
  .back-header .page-title{font-size:20px}
</style>
</head>
<body>
<div class="app">

  <!-- PAGE: LIFTS -->
  <div class="page active" id="page-lifts">
    <div class="page-header">
      <span class="page-title">My lifts</span>
      <button class="btn btn-sm btn-primary" onclick="toggleAddLift()">+ Add lift</button>
    </div>
    <div style="padding:0 16px">
      <div class="inline-form" id="add-lift-form" style="display:none">
        <div class="form-row"><label class="form-label">Lift name</label><input type="text" id="new-lift-name" placeholder="e.g. Bench press" autocomplete="off"></div>
        <div class="form-row"><label class="form-label">Starting weight (lbs)</label><input type="number" id="new-lift-weight" value="45" min="0" step="2.5" inputmode="decimal"></div>
        <div class="form-row"><label class="form-label">Weight increment</label>
          <select id="new-lift-inc">
            <option value="2.5">+2.5 lbs (isolation lifts)</option>
            <option value="5" selected>+5 lbs (compound lifts)</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn btn-primary" onclick="addLift()" style="flex:1">Save lift</button>
          <button class="btn" onclick="toggleAddLift()">Cancel</button>
        </div>
      </div>
      <div id="lifts-list"></div>
    </div>
  </div>

  <!-- PAGE: LOG -->
  <div class="page" id="page-log">
    <div id="log-select-view">
      <div class="page-header"><span class="page-title">Log workout</span></div>
      <div style="padding:0 16px" id="log-lift-list"></div>
    </div>
    <div id="log-session-view" style="display:none">
      <div class="back-header">
        <button class="btn btn-sm" onclick="backToSelect()">← Back</button>
      </div>
      <div style="padding:0 16px">
        <div class="card-cream">
          <div class="big-title" id="log-lift-title"></div>
          <div style="font-size:14px;color:var(--ink3);margin-top:2px" id="log-target-line"></div>
          <div class="dots" id="log-dots"></div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:14px;color:var(--ink2);font-weight:500">Weight</span>
            <span style="font-size:12px;color:var(--ink3)" id="log-inc-label"></span>
          </div>
          <div class="weight-ctrl">
            <button class="w-btn" onclick="adjustWeight(-1)">−</button>
            <span class="w-val" id="log-weight-display">135 lbs</span>
            <button class="w-btn" onclick="adjustWeight(1)">+</button>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink3)">
            <span id="log-last-weight"></span>
            <span id="log-pr-line"></span>
          </div>
        </div>
        <div class="card" id="log-sets-card">
          <div class="set-grid" id="log-sets"></div>
          <button class="btn btn-primary btn-full" id="log-set-btn" onclick="logSet()">Log set 1</button>
        </div>
        <div id="log-session-done" style="display:none">
          <div class="card" style="text-align:center;padding:2rem 1.5rem">
            <div style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:8px" id="done-msg"></div>
            <div style="font-size:14px;color:var(--ink3);line-height:1.5" id="done-sub"></div>
            <button class="btn btn-primary btn-full" onclick="finishSession()">Save &amp; finish</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE: HISTORY -->
  <div class="page" id="page-history">
    <div class="page-header">
      <span class="page-title">History</span>
      <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
    </div>
    <div style="padding:0 16px" id="history-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav-bar">
    <button class="nav-btn active" onclick="showPage('lifts',this)" id="nav-lifts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M18 4v16M3 8h4M17 8h4M3 16h4M17 16h4"/>
      </svg>
      Lifts
    </button>
    <button class="nav-btn" onclick="showPage('log',this)" id="nav-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Log
    </button>
    <button class="nav-btn" onclick="showPage('history',this)" id="nav-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      History
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'lift-tracker-v1';
let state = { lifts: [], history: [] };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  renderAll();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'log') renderLogSelect();
  if (name === 'history') renderHistory();
  window.scrollTo(0, 0);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function toggleAddLift() {
  const f = document.getElementById('add-lift-form');
  const visible = f.style.display !== 'none';
  f.style.display = visible ? 'none' : 'block';
  if (!visible) setTimeout(() => document.getElementById('new-lift-name').focus(), 50);
}

function addLift() {
  const name = document.getElementById('new-lift-name').value.trim();
  const weight = parseFloat(document.getElementById('new-lift-weight').value) || 45;
  const inc = parseFloat(document.getElementById('new-lift-inc').value);
  if (!name) { toast('Enter a lift name'); return; }
  state.lifts.push({ id: Date.now(), name, weight, inc, pr: weight, pendingUp: false });
  saveState();
  document.getElementById('new-lift-name').value = '';
  document.getElementById('new-lift-weight').value = 45;
  document.getElementById('add-lift-form').style.display = 'none';
  renderLifts();
  toast('Lift added ✓');
}

function deleteLift(id) {
  if (!confirm('Remove this lift and its history?')) return;
  state.lifts = state.lifts.filter(l => l.id !== id);
  state.history = state.history.filter(h => h.liftId !== id);
  saveState(); renderLifts();
}

function renderLifts() {
  const el = document.getElementById('lifts-list');
  if (!state.lifts.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏋️</div>No lifts yet.<br>Tap <strong>+ Add lift</strong> to get started.</div>';
    return;
  }
  el.innerHTML = state.lifts.map(l => `
    <div class="card">
      <div class="lift-row">
        <div style="flex:1">
          <div class="lift-name">${l.name}</div>
          <div class="lift-meta">${l.weight} lbs &nbsp;·&nbsp; +${l.inc} lb increments &nbsp;·&nbsp; PR: ${l.pr} lbs</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${l.pendingUp ? `<span class="badge badge-up">+${l.inc} lbs next</span>` : ''}
          <button class="btn btn-sm btn-danger" onclick="deleteLift(${l.id})">Remove</button>
        </div>
      </div>
    </div>`).join('');
}

let session = null;

function renderLogSelect() {
  const el = document.getElementById('log-lift-list');
  document.getElementById('log-select-view').style.display = 'block';
  document.getElementById('log-session-view').style.display = 'none';
  if (!state.lifts.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💪</div>Add lifts on the Lifts tab first.</div>';
    return;
  }
  el.innerHTML = state.lifts.map(l => `
    <div class="card card-tap" onclick="startSession(${l.id})">
      <div class="lift-row">
        <div>
          <div class="lift-name">${l.name}</div>
          <div class="lift-meta">Last: ${l.weight} lbs${l.pendingUp ? ` &nbsp;·&nbsp; <span style="color:var(--green-dark);font-weight:500">→ ${+(l.weight+l.inc).toFixed(1)} lbs next</span>` : ''}</div>
        </div>
        ${l.pendingUp ? `<span class="badge badge-up">+${l.inc}</span>` : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>'}
      </div>
    </div>`).join('');
}

function startSession(id) {
  const lift = state.lifts.find(l => l.id === id);
  if (!lift) return;
  const startWeight = lift.pendingUp ? +(lift.weight + lift.inc).toFixed(1) : lift.weight;
  session = { liftId: id, weight: startWeight, sets: [], repsInput: 10 };
  document.getElementById('log-select-view').style.display = 'none';
  document.getElementById('log-session-view').style.display = 'block';
  document.getElementById('log-session-done').style.display = 'none';
  document.getElementById('log-sets-card').style.display = 'block';
  document.getElementById('log-lift-title').textContent = lift.name;
  document.getElementById('log-target-line').textContent = `Target: ${startWeight} lbs · 3 × 10`;
  document.getElementById('log-last-weight').textContent = `Last: ${lift.weight} lbs`;
  document.getElementById('log-pr-line').textContent = `PR: ${lift.pr} lbs`;
  document.getElementById('log-inc-label').textContent = `+${lift.inc} lbs per step`;
  renderSessionWeight();
  renderSets();
  window.scrollTo(0, 0);
}

function backToSelect() { session = null; renderLogSelect(); }

function renderSessionWeight() {
  document.getElementById('log-weight-display').textContent = session.weight + ' lbs';
}

function adjustWeight(dir) {
  const lift = state.lifts.find(l => l.id === session.liftId);
  session.weight = Math.max(0, +(session.weight + dir * lift.inc).toFixed(1));
  renderSessionWeight();
}

function renderSets() {
  const dots = document.getElementById('log-dots');
  const grid = document.getElementById('log-sets');
  const btn = document.getElementById('log-set-btn');

  dots.innerHTML = [0,1,2].map(i => {
    const s = session.sets[i];
    return `<div class="dot${s ? (s.failed ? ' failed' : ' done') : ''}"></div>`;
  }).join('');

  grid.innerHTML = [0,1,2].map(i => {
    const s = session.sets[i];
    if (!s) return `<div class="set-card"><div class="set-label">Set ${i+1}</div><div class="set-reps" style="color:var(--ink3)">—</div></div>`;
    const cls = s.failed ? 'failed' : 'done';
    return `<div class="set-card ${cls}">
      <div class="set-label">Set ${i+1}</div>
      <div class="set-reps">${s.reps}${s.failed ? ' ✗' : ' ✓'}</div>
      <div class="set-sublabel">${s.weight} lbs</div>
    </div>`;
  }).join('');

  if (session.sets.length < 3) {
    btn.style.display = 'block';
    btn.textContent = `Log set ${session.sets.length + 1}`;
    document.getElementById('log-session-done').style.display = 'none';

    // Reps + fail controls
    const ctrl = document.createElement('div');
    ctrl.className = 'reps-row';
    ctrl.innerHTML = `
      <span style="font-size:13px;color:var(--ink3)">Reps:</span>
      <button class="w-btn" style="width:36px;height:36px;font-size:20px" onclick="adjReps(-1)">−</button>
      <span id="reps-disp" style="font-size:18px;font-weight:600;color:var(--ink);min-width:28px;text-align:center">${session.repsInput}</span>
      <button class="w-btn" style="width:36px;height:36px;font-size:20px" onclick="adjReps(1)">+</button>
      <button class="btn btn-sm btn-danger" onclick="logFailed()">Mark failed</button>`;
    grid.appendChild(ctrl);
  } else {
    btn.style.display = 'none';
    showSessionDone();
  }
}

function adjReps(d) {
  session.repsInput = Math.max(1, session.repsInput + d);
  const el = document.getElementById('reps-disp');
  if (el) el.textContent = session.repsInput;
}

function logSet() {
  session.sets.push({ reps: session.repsInput, weight: session.weight, failed: false });
  renderSets();
}

function logFailed() {
  session.sets.push({ reps: session.repsInput, weight: session.weight, failed: true });
  renderSets();
}

function showSessionDone() {
  const hasFailed = session.sets.some(s => s.failed);
  const shouldProgress = session.sets.length === 3 && !hasFailed;
  const lift = state.lifts.find(l => l.id === session.liftId);
  document.getElementById('done-msg').textContent = shouldProgress
    ? '🎉 Great work! Weight goes up next session.'
    : '📋 Session logged — holding weight.';
  document.getElementById('done-sub').textContent = shouldProgress
    ? `Next time: ${+(lift.weight + lift.inc).toFixed(1)} lbs (+${lift.inc} lbs)`
    : `Next time: ${lift.weight} lbs (no change)`;
  document.getElementById('log-session-done').style.display = 'block';
  document.getElementById('log-set-btn').style.display = 'none';
}

function finishSession() {
  const lift = state.lifts.find(l => l.id === session.liftId);
  const hasFailed = session.sets.some(s => s.failed);
  const shouldProgress = session.sets.length === 3 && !hasFailed;
  const maxWeight = Math.max(...session.sets.map(s => s.weight));
  if (maxWeight > lift.pr) lift.pr = maxWeight;
  if (shouldProgress) { lift.weight = +(lift.weight + lift.inc).toFixed(1); lift.pendingUp = false; }
  state.history.unshift({
    date: new Date().toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}),
    liftId: lift.id, liftName: lift.name,
    sets: JSON.parse(JSON.stringify(session.sets)),
    progressed: shouldProgress
  });
  saveState();
  session = null;
  toast('Session saved! 💪');
  renderAll();
  showPage('history', document.getElementById('nav-history'));
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!state.history.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📈</div>No sessions yet.<br>Log your first workout!</div>';
    return;
  }
  const byLift = {};
  state.history.forEach(h => {
    if (!byLift[h.liftId]) byLift[h.liftId] = { name: h.liftName, sessions: [] };
    byLift[h.liftId].sessions.push(h);
  });
  el.innerHTML = Object.values(byLift).map(lb => {
    const recent = lb.sessions.slice(0, 8);
    const weights = recent.map(s => Math.max(...s.sets.map(x => x.weight))).reverse();
    const maxW = Math.max(...weights) || 1;
    const bars = weights.map((w, i) =>
      `<div class="bar" style="height:${Math.max(10,Math.round((w/maxW)*100))}%;background:${i===weights.length-1?'var(--green)':'var(--green-light)'}"></div>`
    ).join('');
    const currentW = Math.max(...lb.sessions[0].sets.map(s => s.weight));
    const prW = Math.max(...lb.sessions.flatMap(s => s.sets.map(x => x.weight)));
    const liftObj = state.lifts.find(l => l.id === lb.sessions[0].liftId);
    return `<div class="card">
      <div class="lift-row" style="margin-bottom:10px">
        <div>
          <div class="lift-name">${lb.name}</div>
          <div class="lift-meta">${lb.sessions.length} session${lb.sessions.length !== 1 ? 's' : ''}</div>
        </div>
        ${lb.sessions[0].progressed ? '<span class="badge badge-up">Progressed</span>' : '<span class="badge badge-fail">Held</span>'}
      </div>
      ${weights.length > 1 ? `<div class="bar-chart">${bars}</div>` : ''}
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Current</div><div class="stat-val">${currentW} lbs</div></div>
        <div class="stat"><div class="stat-label">All-time PR</div><div class="stat-val green">${prW} lbs</div></div>
      </div>
      ${liftObj ? `<div class="rule-box">3 sets × 10 reps → next session adds <strong>+${liftObj.inc} lbs</strong></div>` : ''}
      <div style="margin-top:12px">
        ${lb.sessions.slice(0, 5).map(h => `
          <div style="border-top:0.5px solid var(--border);padding:10px 0">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <span style="font-size:13px;color:var(--ink2);font-weight:500">${h.date}</span>
              ${h.progressed ? '<span class="badge badge-up" style="font-size:11px">Progressed</span>' : '<span class="badge badge-fail" style="font-size:11px">Held</span>'}
            </div>
            <div class="history-sets">
              ${h.sets.map((s,i) => `<div class="hset ${s.failed?'hset-fail':'hset-done'}">
                <div style="font-size:10px;color:${s.failed?'var(--red)':'var(--green)'};margin-bottom:3px">Set ${i+1}</div>
                <div style="font-size:14px;font-weight:600;color:${s.failed?'var(--red)':'var(--green-dark)'}">${s.reps}${s.failed?'✗':'✓'}</div>
                <div style="font-size:10px;color:${s.failed?'var(--red)':'var(--green)'}">${s.weight}lb</div>
              </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function exportCSV() {
  if (!state.history.length) { toast('No history to export yet'); return; }
  const rows = [['Date','Lift','Set','Reps','Weight (lbs)','Failed','Progressed']];
  state.history.forEach(h => {
    h.sets.forEach((s, i) => {
      rows.push([h.date, h.liftName, i+1, s.reps, s.weight, s.failed?'Yes':'No', h.progressed?'Yes':'No']);
    });
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'workout-log.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}

function renderAll() { renderLifts(); }
loadState();
</script>
</body>
</html>
